---
- name: (Deprecation) Catch and report renamed settings
  ansible.builtin.fail:
    msg: >-
      Your configuration contains a variable, which now has a different name.
      Please change your configuration to rename the variable (`{{ item.old }}` -> `{{ item.new }}`).
  when: "lookup('ansible.builtin.varnames', ('^' + item.old + '$'), wantlist=True) | length > 0"
  with_items:
    - { "old": "bazarr_container_image_force_pull", "new": "<removed> (the new community.docker.docker_image_pull module handles this natively)" }

- name: Fail if required Bazarr settings not defined
  ansible.builtin.fail:
    msg: >-
      You need to define a required configuration setting (`{{ item.name }}`).
  when: "item.when | bool and lookup('vars', item.name, default='') | string | length == 0"
  with_items:
    - { "name": "bazarr_uid", when: true }
    - { "name": "bazarr_gid", when: true }
    - { "name": "bazarr_hostname", when: true }
    - { "name": "bazarr_path_prefix", when: true }
    - { "name": "bazarr_container_network", when: true }
    - { "name": "bazarr_container_labels_traefik_middleware_basic_auth_users", when: "{{ bazarr_container_labels_traefik_middleware_basic_auth_enabled }}"}

- name: Fail if Bazarr architecture is not supported
  ansible.builtin.fail:
    msg: >
      Your configuration specifies a CPU architecture (`{{ bazarr_arch }}`) which is not currently supported.
      This Bazarr role also does not support self-building yet, so it's not possible to make use of it.
  when: "bazarr_arch not in ['amd64', 'arm64']"

- name: Run if Traefik is enabled
  when: bazarr_container_labels_traefik_enabled | bool
  block:
    - name: Fail if Traefik settings required for Bazarr are not defined
      ansible.builtin.fail:
        msg: >-
          You need to define a required configuration setting (`{{ item }}`).
      when: "lookup('vars', item, default='') | string | length == 0"
      with_items:
        - bazarr_container_labels_traefik_hostname
        - bazarr_container_labels_traefik_path_prefix

    # We ensure it doesn't end with a slash, because we handle both (slash and no-slash).
    # Knowing that `bazarr_container_labels_traefik_path_prefix` does not end with a slash
    # ensures we know how to set these routes up without having to do "does it end with a slash" checks elsewhere.
    - name: Fail if bazarr_container_labels_traefik_path_prefix ends with a slash
      ansible.builtin.fail:
        msg: >-
          bazarr_container_labels_traefik_path_prefix (`{{ bazarr_container_labels_traefik_path_prefix }}`) must either be `/` or not end with a slash (e.g. `/bazarr`).
      when: "bazarr_container_labels_traefik_path_prefix != '/' and bazarr_container_labels_traefik_path_prefix[-1] == '/'"
