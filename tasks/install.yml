---
- name: Ensure Bazarr paths exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0750"
    owner: "{{ bazarr_uid }}"
    group: "{{ bazarr_gid }}"
  with_items:
    - "{{ bazarr_base_path }}"
    - "{{ bazarr_data_path }}"

- name: Ensure Bazarr support files installed
  ansible.builtin.template:
    src: "{{ role_path }}/templates/{{ item }}.j2"
    dest: "{{ bazarr_base_path }}/{{ item }}"
    mode: "0640"
    owner: "{{ bazarr_uid }}"
    group: "{{ bazarr_gid }}"
  with_items:
    - env
    - labels
  register: bazarr_support_files_result

- name: Ensure Bazarr container image is pulled via community.docker.docker_image_pull
  when: devture_systemd_docker_base_container_image_pull_method == 'ansible-module'
  community.docker.docker_image_pull:
    name: "{{ bazarr_container_image }}"
    pull: always
  register: bazarr_container_image_pull_result_ansible_module
  retries: "{{ devture_playbook_help_container_retries_count }}"
  delay: "{{ devture_playbook_help_container_retries_delay }}"
  until: bazarr_container_image_pull_result_ansible_module is not failed

- name: Ensure Bazarr container image is pulled via ansible.builtin.command
  when: devture_systemd_docker_base_container_image_pull_method == 'command'
  ansible.builtin.command:
    cmd: "{{ devture_systemd_docker_base_host_command_docker }} pull {{ bazarr_container_image }}"
  register: bazarr_container_image_pull_result_command
  retries: "{{ devture_playbook_help_container_retries_count }}"
  delay: "{{ devture_playbook_help_container_retries_delay }}"
  until: bazarr_container_image_pull_result_command is not failed
  changed_when: "'Downloaded newer image' in bazarr_container_image_pull_result_command.stdout"

- name: Ensure Bazarr container network is created via community.docker.docker_network
  when: devture_systemd_docker_base_container_network_creation_method == 'ansible-module'
  community.docker.docker_network:
    enable_ipv6: "{{ devture_systemd_docker_base_ipv6_enabled }}"
    name: "{{ bazarr_container_network }}"
    driver: bridge
    driver_options: "{{ devture_systemd_docker_base_container_networks_driver_options }}"
  register: bazarr_network_creation_result

- name: Ensure Bazarr container network is created via ansible.builtin.command
  when: devture_systemd_docker_base_container_network_creation_method == 'command'
  ansible.builtin.command:
    cmd: >-
      {{ devture_systemd_docker_base_host_command_docker }} network create
      {% if devture_systemd_docker_base_ipv6_enabled %}--ipv6{% endif %}
      {{ devture_systemd_docker_base_container_networks_driver_options_string }}
      {{ bazarr_container_network }}
  register: bazarr_network_creation_result
  changed_when: bazarr_network_creation_result.rc == 0
  failed_when: bazarr_network_creation_result.rc != 0 and 'already exists' not in bazarr_network_creation_result.stderr

- name: Ensure Bazarr systemd service is present
  ansible.builtin.template:
    src: "{{ role_path }}/templates/systemd/bazarr.service.j2"
    dest: "{{ devture_systemd_docker_base_systemd_path }}/{{ bazarr_identifier }}.service"
    mode: "0644"
  register: bazarr_systemd_service_result

- name: Determine whether Bazarr needs a restart
  ansible.builtin.set_fact:
    bazarr_restart_necessary: >-
      {{
        bazarr_support_files_result.changed | default(false)
        or bazarr_systemd_service_result.changed | default(false)
        or bazarr_container_image_pull_result_ansible_module.changed | default(false)
        or bazarr_container_image_pull_result_command.changed | default(false)
      }}
