---
# Project source code URL: https://github.com/morpheus65535/bazarr

bazarr_enabled: true

bazarr_identifier: bazarr
bazarr_base_path: "/{{ bazarr_identifier }}"
bazarr_data_path: "{{ bazarr_base_path }}/data"

# renovate: datasource=docker depName=lscr.io/linuxserver/bazarr
bazarr_version: v1.5.6-ls342

bazarr_uid: ""
bazarr_gid: ""

# The scheme used for serving Bazarr.
bazarr_scheme: https

# The hostname at which Bazarr is served.
bazarr_hostname: ""

# The path at which Bazarr is served.
# This value must either be `/` or not end with a slash (e.g. `/bazarr`).
bazarr_path_prefix: /

bazarr_container_image: "{{ bazarr_container_image_registry_prefix }}linuxserver/bazarr:{{ bazarr_container_image_tag }}"
bazarr_container_image_tag: "{{ bazarr_version }}"
bazarr_container_image_registry_prefix: "{{ bazarr_container_image_registry_prefix_upstream }}"
bazarr_container_image_registry_prefix_upstream: "{{ bazarr_container_image_registry_prefix_upstream_default }}"
bazarr_container_image_registry_prefix_upstream_default: docker.io/

# The base container network. It will be auto-created by this role if it doesn't exist already.
bazarr_container_network: "{{ bazarr_identifier }}"

# Control if the container network is deleted on uninstalling.
bazarr_container_network_deletion_enabled: true

# Specify how the container publishes its HTTP port (as defined by `bazarr_container_http_port`).
#
# Takes an "<ip>:<port>" or "<port>" value (e.g. "127.0.0.1:2586"), or empty string to not expose.
bazarr_container_http_host_bind_port: ""

# The port number in the container
bazarr_container_http_port: 6767

# A list of additional container networks that the container would be connected to.
# The role does not create these networks, so make sure they already exist.
# Use this to expose this container to another reverse proxy, which runs in a different container network.
bazarr_container_additional_networks: "{{ bazarr_container_additional_networks_auto + bazarr_container_additional_networks_custom }}"
bazarr_container_additional_networks_auto: []
bazarr_container_additional_networks_custom: []

# A list of additional "volumes" to mount in the container.
# This list gets populated dynamically at runtime. You can provide a different default value,
# if you wish to mount your own files into the container.
# Contains definition objects like this: `{"type": "bind", "src": "/outside", "dst": "/inside", "options": "readonly"}.
# See the `--mount` documentation for the `docker run` command.
bazarr_container_additional_volumes: "{{ bazarr_container_additional_volumes_auto + bazarr_container_additional_volumes_custom }}"
bazarr_container_additional_volumes_auto: []
bazarr_container_additional_volumes_custom: []

# bazarr_container_labels_traefik_enabled controls whether labels to assist a Traefik reverse-proxy will be attached to the container.
# See `../templates/labels.j2` for details.
#
# To inject your own other container labels, see `bazarr_container_labels_additional_labels_custom`.
bazarr_container_labels_traefik_enabled: true
bazarr_container_labels_traefik_docker_network: "{{ bazarr_container_network }}"
bazarr_container_labels_traefik_hostname: "{{ bazarr_hostname }}"
# The path prefix must either be `/` or not end with a slash (e.g. `/bazarr`).
bazarr_container_labels_traefik_path_prefix: "{{ bazarr_path_prefix }}"
bazarr_container_labels_traefik_rule: "Host(`{{ bazarr_container_labels_traefik_hostname }}`){% if bazarr_container_labels_traefik_path_prefix != '/' %} && PathPrefix(`{{ bazarr_container_labels_traefik_path_prefix }}`){% endif %}"
bazarr_container_labels_traefik_priority: 0
bazarr_container_labels_traefik_entrypoints: web-secure
bazarr_container_labels_traefik_tls: "{{ bazarr_container_labels_traefik_entrypoints != 'web' }}"
bazarr_container_labels_traefik_tls_certResolver: default  # noqa var-naming
bazarr_container_labels_traefik_middleware_basic_auth_enabled: false
# See: https://doc.traefik.io/traefik/reference/routing-configuration/http/middlewares/basicauth/
bazarr_container_labels_traefik_middleware_basic_auth_users: ""

# Controls which additional headers to attach to all HTTP requests.
# To add your own custom request headers, use `bazarr_container_labels_traefik_additional_request_headers_custom`
bazarr_container_labels_traefik_additional_request_headers: "{{ bazarr_container_labels_traefik_additional_request_headers_auto | combine(bazarr_container_labels_traefik_additional_request_headers_custom) }}"
bazarr_container_labels_traefik_additional_request_headers_auto: {}
bazarr_container_labels_traefik_additional_request_headers_custom: {}

# Controls which additional headers to attach to all HTTP responses.
# To add your own custom response headers, use `bazarr_container_labels_traefik_additional_response_headers_custom`
bazarr_container_labels_traefik_additional_response_headers: "{{ bazarr_container_labels_traefik_additional_response_headers_auto | combine(bazarr_container_labels_traefik_additional_response_headers_custom) }}"
bazarr_container_labels_traefik_additional_response_headers_auto: |
  {{
    {}
    | combine ({'X-XSS-Protection': bazarr_http_header_xss_protection} if bazarr_http_header_xss_protection else {})
    | combine ({'X-Content-Type-Options': bazarr_http_header_content_type_options} if bazarr_http_header_content_type_options else {})
    | combine ({'Content-Security-Policy': bazarr_http_header_content_security_policy} if bazarr_http_header_content_security_policy else {})
    | combine ({'Permissions-Policy': bazarr_http_header_permissions_policy} if bazarr_http_header_permissions_policy else {})
    | combine ({'Strict-Transport-Security': bazarr_http_header_strict_transport_security} if bazarr_http_header_strict_transport_security and bazarr_container_labels_traefik_tls else {})
  }}
bazarr_container_labels_traefik_additional_response_headers_custom: {}

# bazarr_container_labels_additional_labels contains a multiline string with additional labels to add to the container label file.
# See `../templates/labels.j2` for details.
# To add your own custom labels, use `bazarr_container_labels_additional_labels_custom`
#
# Example:
# bazarr_container_labels_additional_labels_custom:
#   - my.label=1
#   - another.label="here"
bazarr_container_labels_additional_labels: "{{ bazarr_container_labels_additional_labels_auto + bazarr_container_labels_additional_labels_custom }}"
bazarr_container_labels_additional_labels_auto: []
bazarr_container_labels_additional_labels_custom: []

# A list of extra arguments to pass to the container (`docker create` command)
bazarr_container_extra_arguments: "{{ bazarr_container_extra_arguments_auto + bazarr_container_extra_arguments_custom }}"
bazarr_container_extra_arguments_auto: []
bazarr_container_extra_arguments_custom: []

# Specifies the value of the `X-XSS-Protection` header
# Stops pages from loading when they detect reflected cross-site scripting (XSS) attacks.
#
# Learn more about it is here:
# - https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/X-XSS-Protection
# - https://portswigger.net/web-security/cross-site-scripting/reflected
bazarr_http_header_xss_protection: "1; mode=block"

# Specifies the value of the `X-Content-Type-Options` header.
# See: https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/X-Content-Type-Options
bazarr_http_header_content_type_options: nosniff

# Specifies the value of the `Content-Security-Policy` header.
# See: https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/Content-Security-Policy
bazarr_http_header_content_security_policy: frame-ancestors 'self'

# Specifies the value of the `Permissions-Policy` header.
# See: https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/Permissions-Policy
bazarr_http_header_permissions_policy: "{{ 'interest-cohort=()' if bazarr_floc_optout_enabled else '' }}"

# Specifies the value of the `Strict-Transport-Security` header.
# See: https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/Strict-Transport-Security
bazarr_http_header_strict_transport_security: "max-age=31536000; includeSubDomains{{ '; preload' if bazarr_hsts_preload_enabled else '' }}"

# Controls whether to send a "Permissions-Policy interest-cohort=();" header along with all responses
#
# Learn more about what it is here:
# - https://www.eff.org/deeplinks/2021/03/googles-floc-terrible-idea
# - https://paramdeo.com/blog/opting-your-website-out-of-googles-floc-network
# - https://amifloced.org/
#
# Of course, a better solution is to just stop using browsers (like Chrome), which participate in such tracking practices.
# See: `bazarr_http_header_permissions_policy`
bazarr_floc_optout_enabled: true

# Controls if HSTS preloading is enabled
#
# In its strongest and recommended form, the [HSTS policy](https://www.chromium.org/hsts) includes all subdomains, and
# indicates a willingness to be "preloaded" into browsers:
# `Strict-Transport-Security: max-age=31536000; includeSubDomains; preload`
# For more information visit:
# - https://en.wikipedia.org/wiki/HTTP_Strict_Transport_Security
# - https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/Strict-Transport-Security
# - https://hstspreload.org/#opt-in
# See: `bazarr_http_header_strict_transport_security`
bazarr_hsts_preload_enabled: false

# List of systemd services that the Bazarr systemd service depends on
bazarr_systemd_required_services_list: "{{ bazarr_systemd_required_services_list_default + bazarr_systemd_required_services_list_auto + bazarr_systemd_required_services_list_custom }}"
bazarr_systemd_required_services_list_default: "{{ [devture_systemd_docker_base_docker_service_name] if devture_systemd_docker_base_docker_service_name else [] }}"
bazarr_systemd_required_services_list_auto: []
bazarr_systemd_required_services_list_custom: []

# List of systemd services that the Bazarr systemd service wants
bazarr_systemd_wanted_services_list: "{{ bazarr_systemd_wanted_services_list_default + bazarr_systemd_wanted_services_list_auto + bazarr_systemd_wanted_services_list_custom }}"
bazarr_systemd_wanted_services_list_default: []
bazarr_systemd_wanted_services_list_auto: []
bazarr_systemd_wanted_services_list_custom: []

# Controls how long to wait for the container to stop gracefully before killing it.
bazarr_container_stop_grace_time_seconds: "{{ devture_systemd_docker_base_container_stop_grace_time_seconds }}"

# Controls how long the pre-start cleanup should wait for stale container-name release
# before failing startup explicitly.
bazarr_container_cleanup_timeout_seconds: "{{ devture_systemd_docker_base_container_cleanup_timeout_seconds }}"

# Controls the delay between pre-start cleanup retries.
bazarr_container_cleanup_retry_delay_seconds: "{{ devture_systemd_docker_base_container_cleanup_retry_delay_seconds }}"

# Shell command used in the systemd pre-start phase to deterministically remove a stale
# container and wait until Docker releases its name.
bazarr_container_cleanup_command: |
  i=0;
  while [ "$i" -lt {{ bazarr_container_cleanup_timeout_seconds }} ]; do
  {{ devture_systemd_docker_base_host_command_docker }} stop -t {{ bazarr_container_stop_grace_time_seconds }} {{ bazarr_identifier }} >/dev/null 2>&1 || true;
  {{ devture_systemd_docker_base_host_command_docker }} rm -f {{ bazarr_identifier }} >/dev/null 2>&1 || true;
  if {{ devture_systemd_docker_base_host_command_docker }} container inspect {{ bazarr_identifier }} >/dev/null 2>&1; then
  i=$((i + 1));
  sleep {{ bazarr_container_cleanup_retry_delay_seconds }};
  continue;
  fi;
  if {{ devture_systemd_docker_base_host_command_docker }} info >/dev/null 2>&1; then
  exit 0;
  fi;
  echo "Failed to query Docker daemon while cleaning up {{ bazarr_identifier }}" >&2;
  exit 1;
  done;
  echo "Failed to remove stale container {{ bazarr_identifier }} after {{ bazarr_container_cleanup_timeout_seconds }} attempts" >&2;
  exit 1

bazarr_arch: amd64

# Specify the timezone
bazarr_environment_variables_tz: UTC

# Additional environment variables.
bazarr_environment_variables_additional_variables: ""

# bazarr_restart_necessary controls whether the Bazarr systemd
# service will be restarted (when true) or merely started (when false) by the
# systemd service manager role (when conditional restart is enabled).
#
# This value is automatically computed during installation based on whether
# any configuration files, the systemd service file, or the container image changed.
# The default of `false` means "no restart needed" — appropriate when the role's
# installation tasks haven't run (e.g., due to --tags skipping them).
bazarr_restart_necessary: false
