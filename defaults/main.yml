---

# Project source code URL: https://github.com/morpheus65535/bazarr

bazarr_enabled: true

bazarr_identifier: bazarr

bazarr_uid: ''
bazarr_gid: ''
bazarr_timezone: 'Etc/UTC'

# renovate: datasource=docker depName=lscr.io/linuxserver/bazarr versioning=semver
bazarr_version: 1.5.6
bazarr_arch: amd64

# The hostname at which bazarr is served.
bazarr_hostname: ''

# The path at which bazarr is served.
# This value must either be `/` or not end with a slash (e.g. `/bazarr`).
bazarr_path_prefix: /

bazarr_base_path: "{{ bazarr_identifier }}"
bazarr_data_path: "{{ bazarr_base_path }}/data"

bazarr_container_image: "{{ bazarr_container_image_registry_prefix }}linuxserver/bazarr:{{ bazarr_container_image_tag }}"
bazarr_container_image_tag: "{{ bazarr_version }}"
bazarr_container_image_registry_prefix: lscr.io/
bazarr_container_image_force_pull: "{{ bazarr_container_image.endswith(':latest') }}"

# The base container network. It will be auto-created by this role if it doesn't exist already.
bazarr_container_network: "{{ bazarr_identifier }}"

# A list of additional container networks that the container would be connected to.
# The role does not create these networks, so make sure they already exist.
bazarr_container_additional_networks: "{{ (bazarr_container_additional_networks_default + bazarr_container_additional_networks_auto + bazarr_container_additional_networks_custom) | unique }}"
bazarr_container_additional_networks_default: []
bazarr_container_additional_networks_auto: []
bazarr_container_additional_networks_custom: []

# Controls how long to wait for the container to stop gracefully before killing it.
# Because `devture_systemd_docker_base_container_stop_grace_time_seconds` may be quite short and databases are more important to stop gracefully,
# we default to at least 30 seconds.
bazarr_container_stop_grace_time_seconds: "{{ [devture_systemd_docker_base_container_stop_grace_time_seconds, 30] | max }}"

# List of systemd services that the Bazarr systemd service depends on
bazarr_systemd_required_services_list: "{{ (bazarr_systemd_required_services_list_default + bazarr_systemd_required_services_list_auto + bazarr_systemd_required_services_list_custom) | unique }}"
bazarr_systemd_required_services_list_default: "{{ [devture_systemd_docker_base_docker_service_name] if devture_systemd_docker_base_docker_service_name else [] }}"
bazarr_systemd_required_services_list_auto: []
bazarr_systemd_required_services_list_custom: []

# List of systemd services that the Bazarr systemd service wants
bazarr_systemd_wanted_services_list: "{{ (bazarr_systemd_wanted_services_list_default + bazarr_systemd_wanted_services_list_auto + bazarr_systemd_wanted_services_list_custom) | unique }}"
bazarr_systemd_wanted_services_list_default: []
bazarr_systemd_wanted_services_list_auto: []
bazarr_systemd_wanted_services_list_custom: []

# The port Bazarr is running on inside the container
bazarr_container_http_port: 6767

# Controls whether the container exposes a port (tcp/6767 in the container)
# that can be used to access Bazarr from outside the container
#
# Takes an "<ip>:<port>" or "<port>" value (e.g. "127.0.0.1:6767"), or empty string to not expose.
bazarr_container_http_bind_port: ""

# To inject your own other container labels, see `bazarr_container_labels_additional_labels`.
bazarr_container_labels_traefik_enabled: true
bazarr_container_labels_traefik_docker_network: "{{ bazarr_container_network }}"
bazarr_container_labels_traefik_hostname: "{{ bazarr_hostname }}"
# The path prefix must either be `/` or not end with a slash (e.g. `/bazarr`).
bazarr_container_labels_traefik_path_prefix: "{{ bazarr_path_prefix }}"
bazarr_container_labels_traefik_rule: "Host(`{{ bazarr_container_labels_traefik_hostname }}`){% if bazarr_container_labels_traefik_path_prefix != '/' %} && PathPrefix(`{{ bazarr_container_labels_traefik_path_prefix }}`){% endif %}"
bazarr_container_labels_traefik_priority: 0
bazarr_container_labels_traefik_entrypoints: web-secure
bazarr_container_labels_traefik_tls: "{{ bazarr_container_labels_traefik_entrypoints != 'web' }}"
bazarr_container_labels_traefik_tls_certResolver: default  # noqa var-naming

# bazarr_container_labels_additional_labels contains a multiline string with additional labels to add to the container label file.
# See `../templates/labels.j2` for details.
#
# Example:
# bazarr_container_labels_additional_labels: |
#   my.label=1
#   another.label="here"
bazarr_container_labels_additional_labels: ''

# bazarr_container_additional_environment_variables contains a multiline string with additional environment variables to pass to the container.
#
# Example:
# bazarr_container_additional_environment_variables: |
#   VAR=1
#   ANOTHER=value
bazarr_container_additional_environment_variables: ''

# A list of additional "volumes" to mount in the container.
#
# See the `--mount` documentation for the `docker run` command.
#
# Example:
# bazarr_container_additional_volumes:
#   - type: bind
#     src: /path/on/the/host
#     dst: /data
#   - type: bind
#     src: /another-path/on/the/host
#     dst: /read-only
#     options: readonly
bazarr_container_additional_volumes: []

# A list of extra arguments to pass to the container
bazarr_container_extra_arguments: []
